{% set name = "annapotater" %}
{% set version = "0.7.3" %}
{% set sha256 = "19c47d8ae710bde5a38c56286bf63c354f71a68b643d1f931edab06d5d410f96" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/lskatz/annapotater/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - make
  host:
    - perl >=5.16
    - perl-bioperl
    - perl-array-intspan >=2.003
  run:
    - perl >=5.16
    - perl-bioperl
    - perl-array-intspan >=2.003

test:
  commands:
    - annapotater --help
    - annapotater --version

about:
  home: https://github.com/lskatz/annapotater
  dev_url: https://github.com/lskatz/annapotater
  summary: A fast SNP annotation tool for haploid genomes
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - lskatz
