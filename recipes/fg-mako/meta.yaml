{% set name = "fg-mako" %}
{% set version = "0.1.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/fg-labs/mako/archive/v{{ version }}.tar.gz
  sha256: 03739d15bc658890c3122103e4c0afc281dd5bfb073a177962f2f153a67ef5d6

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  ignore_run_exports_from:
    - libdeflate
    - libgit2
    - zlib

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
    - make
  host:
    - libdeflate
    - libgit2
    - zlib

test:
  commands:
    - mako --version

about:
  home: https://github.com/fg-labs/mako
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Fast SAM/BAM sorter (installs the `mako` binary).
  dev_url: https://github.com/fg-labs/mako
  doc_url: https://docs.rs/fg-mako

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - nh13
