{% set name = "regain-cli" %}
{% set version = "1.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ERBringHorvath/regain_CLI/archive/refs/tags/v{{ version }}.tar.gz
  sha256: b77fb924472e6aa1fe09f8798ee52da5eff9ee178c023be1fe42d15ec68fdad9

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"
  number: 0
  entry_points:
    - regain = regain.cli:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
  run:
    - python >=3.10

    # External tools
    - ncbi-amrfinderplus
    - blast
    - fastani
    - mash
    - biopython >=1.83
    - pandas
    - tqdm >=4.67

    # R runtime + packages used by bnS/bnL/MVA/visualize:
    - r-base >=4.4
    - r-optparse
    - r-dplyr
    - r-tidyr
    - r-tibble
    - r-igraph
    - r-visnetwork
    - r-reshape2
    - r-scales
    - r-ggplot2
    - r-ggrepel
    - r-tidygraph
    - r-ggraph
    - r-ellipse
    - r-vegan
    - r-ape
    - r-compositions
    - r-cluster
    - r-pbapply
    - r-foreach
    - r-doparallel
    - r-progressr
    - r-rcolorbrewer
    - r-bnlearn
    - r-grain
    - bioconductor-graph

test:
  commands:
    - regain -h
    - regain --module-health
    - regain bnS -h
    - regain bnL -h
    - regain AMR -h
    - regain matrix -h
    - regain MVA -h
    - regain collapse-features -h
    - regain matrix-summary -h
    - regain genome-similarity -h
    - regain network-analysis -h
    - regain network -h
    - fastANI --help
    - mash --version
    - blastn -version
    - amrfinder -h

about:
  home: https://github.com/ERBringHorvath/regain_CLI
  summary: "Bayesian-network pipeline for resistance/virulence gene co-occurrence analysis."
  license: MIT
  license_file: LICENSE
  description: |
    ReGAIN is a reproducible CLI for quantifying co-occurrence among
    bacterial antibiotic/heavy metal resistance and virulence genes using Bayesian network
    structure learning (bnlearn/gRain) and post-hoc metrics. It includes
    dataset curation, visualization, and multivariate analysis.

extra:
  recipe-maintainers:
    - ERBringHorvath

