{% set name = "fmh-funprofiler" %}
{% set version = "1.1.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/KoslickiLab/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 836b02dd08521bff013d2a2f209c06e9ba72d10aff67cb5373b8a15a5e4891ce

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python
    - pandas
    - numpy
    - sourmash
    - biom-format

test:
  import:
    - {{ name }}
  commands:
    - funcprofiler --help

about:
  home: https://github.com/KoslickiLab/{{ name }}
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "{{ name }} is a pipeline that leverages FracMinHash (implemented in sourmash) to functionally profile metagenomic samples, offering a faster and more memory-efficient alternative to alignment-based methods."
  dev_url: https://github.com/KoslickiLab/{{ name }}

extra:
  identifiers:
    - doi:10.1093/bioinformatics/btae397
    - biotools:{{ name }}
  recipe-maintainers:
    - dkoslicki
    - miraep8
