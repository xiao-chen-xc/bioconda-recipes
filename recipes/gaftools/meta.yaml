{% set name = "gaftools" %}
{% set version = "1.4.0" %}
{% set sha256 = "07a47eb8fa496d5bc73fcfb68c475eff04c1724cef914f179ea6c337eb6758a7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed -vv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}


requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=77.0.3
    - setuptools-scm
  run:
    - python >=3.9
    - pysam
    - pywfa ==0.5.1
    - pyfastx
    - setuptools  # provides distutils.version at runtime

test:
  commands:
    - gaftools -h

about:
  home: "https://github.com/marschall-lab/gaftools"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'gaftools is a fast and comprehensive toolkit designed for processing pangenome alignments in GAF format'
  doc_url: "https://gaftools.readthedocs.io/en/latest/index.html"
  dev_url: "https://github.com/marschall-lab"
