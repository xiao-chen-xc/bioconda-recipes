{% set version = "0.1.1" %}

package:
  name: mft-tools
  version: {{ version }}

source:
  url: "https://github.com/treangenlab/mft-tools/archive/refs/tags/v{{ version }}.tar.gz"
  sha256: 0386cf83c3ad124ede0db7a07fffe1a28fb6ed524f230fe8eb02f88836bba9dc

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('mft-tools', max_pin="x.x") }}
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - cargo install -v --locked --no-track --root $PREFIX --path .

test:
  commands:
    - mft --help


requirements:
  build: 
    - {{ compiler("rust") }}
    - cargo-bundle-licenses
    - {{ stdlib("c") }}

about:
  home: "https://github.com/treangenlab/mft-tools"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Tranform DNA sequences using the Min-Frame Transformation (MFT)" 
  doc_url: "https://github.com/treangenlab/mft-tools/blob/main/README.md"
  dev_url: "https://github.com/treangenlab/mft-tools"

extra:
  recipe-maintainers:
    - rdoughty10
  additional-platforms:
    -linux-aarch64
    -osx-arm64


