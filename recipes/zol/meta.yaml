{% set name = "zol" %}
{% set version = "1.6.19" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/Kalan-Lab/zol/archive/refs/tags/v{{ version }}.tar.gz
    sha256: 0d0af9d6e261bb7f4e1ff1b7b53be9f16f7a014e703a0b03d31c1d60063d33ad
    folder: zol_folder
  - url: https://github.com/raufs/gravis/archive/refs/tags/v0.1.1.tar.gz
    sha256: d8a8b09a23522ab746eea740adc05f22cb6a1d5190c1b64ee4f304e62b37268b
    folder: gravis_fork_folder

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('zol', max_pin="x") }}

requirements:
  build:
     - {{ compiler('cxx') }}
     - {{ stdlib('c') }}
  host:
    - python
    - setuptools
    - pip
  run:
    - python >=3.10
    - pip
    - curl
    - setuptools
    - r-base
    - biopython
    - muscle =5.1
    - famsa >2
    - mcl
    - pal2nal >=14.1
    - hmmer >=3.0.0
    - fasttree
    - diamond =2.1.11
    - pyrodigal
    - prodigal
    - prodigal-gv
    - pyhmmer =0.11.4
    - libopenblas
    - pympler
    - pandas >=2.0
    - xlsxwriter >=3.0.3
    - scikit-learn
    - hyphy >=2.5.14
    - pomegranate >=1.0.0
    - r-ggplot2
    - r-cowplot
    - r-gggenes
    - r-gridextra
    - skani >=0.2.2
    - slclust
    - trimal
    - gzip
    - miniprot =0.13  # [x86_64]
    - miniprot >=0.13  # [not x86_64]
    - bioconductor-ggtree
    - ete3
    - legacy-cgi 
    - codoff >=1.2.3
    - colour
    - rich-argparse
    - tqdm
    - aiofile
    - aiohttp
    - peptides

test:
  commands:
    - zol -h

about:
  home: "https://github.com/Kalan-Lab/zol"
  license: "BSD-3-Clause"
  license_file: zol_folder/LICENSE
  license_family: BSD
  summary: "zol (& fai): large-scale targeted detection and evolutionary investigation of gene clusters."
  dev_url: "https://github.com/Kalan-Lab/zol"
  doc_url: "https://github.com/Kalan-Lab/zol/wiki"
  
extra:
  additional-platforms:
    - osx-arm64
    - linux-aarch64
  recipe-maintainers:
    - raufs
