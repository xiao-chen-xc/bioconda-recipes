{% set version = "1.1.1" %}

package:
  name: bactopia-gather
  version: {{ version }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('bactopia-gather', max_pin='x.x') }}

source:
  url: https://github.com/bactopia/bactopia-gather/archive/v{{version}}.tar.gz
  sha256: fa6996383bba4c01dc800320f6b22e3705a9750d59ae58ea555a96c71f6ed18f

requirements:
  run:
    - bactopia-py >=2.2.0
    - art >=2016.06.05
    - bbmap >=39.01
    - coreutils
    - fastq-dl >=4.0.1
    - fastq-scan >=1.0.1
    - gsl 2.6
    - mash >=2.3
    - ncbi-genome-download >=0.3.3
    - rename
    - pigz
    - python <3.13
    - sed

test:
  commands:
    - "bactopia-gather --version"
    - "bactopia-gather"

about:
  home: https://bactopia.github.io/
  license: MIT
  license_file: LICENSE
  summary: The methods used in Bactopia to gather all samples into one place
  dev_url: https://github.com/bactopia/bactopia-gather/

extra:
  recipe-maintainers:
    - rpetit3
  identifiers:
    - biotools:bactopia
    - doi:10.1128/mSystems.00190-20
