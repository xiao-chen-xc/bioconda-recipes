{% set name = "grz-cli" %}
{% set version = "1.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/grz_cli-{{ version }}.tar.gz
  sha256: 4a118e50ebd634c96d6e552e315d53af64183e417f7f65689081ea8864e779a0

build:
  entry_points:
    - grz-cli = grz_cli.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.12
    - hatchling
    - pip
  run:
    - python >=3.12
    - packaging >=23,<27
    - grz-common >=2.1,<3

test:
  imports:
    - grz_cli
  commands:
    - pip check  # please don't remove, to ensure pyproject.toml dependencies respected
    - grz-cli --help
  requires:
    - pip

about:
  home: https://github.com/BfArM-MVH/grz-tools
  summary: "Tool for validation, encryption and upload of MV submissions to GDCs."
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tedil
    - hoeze
