{% set version = "2.14" %}

package:
  name: 'illumina-utils'
  version: '{{ version }}'

source:
  url: https://pypi.io/packages/source/i/illumina-utils/illumina_utils-{{ version }}.tar.gz
  sha256: '5536158e97f9264d428fb7666b9f60a9a19568a2dbd77331426e8043f9d55564'

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('illumina-utils', max_pin="x") }}

requirements:
  host:
    - python >=3
    - pip
    - setuptools >=61
    - wheel
  run:
    - python >=3
    - matplotlib-base
    - python-levenshtein
    - numpy

test:
  imports:
    - IlluminaUtils
    - IlluminaUtils.lib
    - IlluminaUtils.utils
  commands:
    - iu-merge-pairs -h
    - iu-gen-configs -h
    - iu-filter-quality-minoche -h
    - iu-demultiplex -h
    - iu-filter-merged-reads -h

about:
  home: https://github.com/meren/illumina-utils
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: COPYING
  summary: A library and collection of scripts to work with Illumina paired-end data (for CASAVA 1.8+).
