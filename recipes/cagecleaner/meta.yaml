{% set name = "cagecleaner" %}
{% set version = "1.5.1" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: fd289f5c711e873aedcf88f04fc4f3026ef1c6cf73a8b4358e4f35a762aba276

build:
  number: 0
  noarch: python
  entry_points:
    - cagecleaner = cagecleaner.main:main
  script: "{{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir"
  run_exports:
    - {{ pin_subpackage('cagecleaner', max_pin="x") }}

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools
  run:
    - python >=3.12
    - biopython
    - cblaster >=1.3.20
    - pandas <3.0.0
    - scipy <=1.14.1
    - ncbi-datasets-cli
    - skder >=1.3.4
    - any2fasta >=0.8.1
    - mmseqs2
    - networkx

test:
  commands:
    - cagecleaner -h

about:
  home: "https://github.com/LucoDevro/CAGEcleaner"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Redundancy removal for gene cluster mining hit sets"
  doc_url: "https://github.com/LucoDevro/CAGEcleaner/wiki"
  dev_url: "https://github.com/LucoDevro/CAGEcleaner"

extra:
  recipe-maintainers:
    - LucoDevro
    - mimitair
  identifiers:
    - doi:10.1101/2025.02.19.639057
