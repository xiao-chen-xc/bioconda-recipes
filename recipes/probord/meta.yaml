{% set name = "probord" %}
{% set version = "1.01" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/mujiezhang/ProBord/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e7e9466957802f569444e98c56adad38a012ffcdad3ae949a56c0d5443beafdb

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - probord = probord.cli:main
  run_exports:
    - {{ pin_subpackage('probord', max_pin="x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - biopython
    - blast
    - checkv =1.0.3
    - ncbi-genome-download

test:
  imports:
    - probord
  commands:
    - probord --help

about:
  home: https://github.com/mujiezhang/ProBord
  license: MIT
  license_file: LICENSE
  summary: A tool for precise delimitation of provirus borders in host genomes
