{% set name = "tbtamr" %}
{% set version = "1.0.4" %}
{% set sha256 = "6d520fe605cd474056d26b427339a9b623394f7e6a0b068366baa51b608bbf68" %}

package:
  name: "{{ name }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: "{{ sha256 }}"

build:
  noarch: python
  number: 0
  entry_points:
    - tbtamr=tbtamr.tbtamr:main
  run_exports:
    - {{ pin_subpackage('tbtamr', max_pin="x.x") }}
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
  run:
    - python >=3.10
    - setuptools
    - mutamr
    - pandas
    - tabulate
    - unidecode
    
test:
  imports:
    - tbtamr
  commands:
    - tbtamr --help

about:
  home: "https://github.com/MDU-PHL/tbtamr"
  license: GPL-3.0-or-later
  license_file: LICENSE
  license_family: "GPL3"
  summary: "A tool implementing TB-Profiler for reporting of genomic DST for M. tuberculosis in a CPHL"
  dev_url: "https://github.com/MDU-PHL/tbtamr"

extra:
  recipe-maintainers:
    - kristyhoran
