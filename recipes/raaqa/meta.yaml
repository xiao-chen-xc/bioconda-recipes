{% set name = "raaqa" %}
{% set version = "0.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/kuzsam/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 0cdea6139d765cc7368ee8a3dc6c227472f81cc16a29852e09d96e9786af2a30

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.10,<3.14
    - pip
    - setuptools
  run:
    - python >=3.10,<3.14
    - pysam >=0.22.0
    - matplotlib-base >=3.8
    - pandas >=2.0
    - numpy >=1.26

test:
  commands:
    - visualise --help
    - mapq_softclip --help

about:
  home: https://github.com/kuzsam/raaqa
  license: MIT
  license_file: LICENSE
  summary: "Read Alignment-based Assembly Quality Assessment"

extra:
  recipe-maintainers:
    - kuzsam
