{% set version = "3.2.5" %}

package:
  name: hicstuff
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/h/hicstuff/hicstuff-{{ version }}.tar.gz
  sha256: 8db7b39fee781bdbbe81add343e2ff49d43ee5b41d21cd3e023962e62b1149b6

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage('hicstuff', max_pin='x') }}
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.8
    - biopython
    - rich-click >=1.7
    - matplotlib-base
    - numpy
    - pandas
    - pysam
    - requests
    - scipy
    - scikit-learn
    - minimap2 
    - bowtie2 
    - samtools
    - pyfastx
    - coreutils
    - cooler
    - pairtools

test:
  imports:
    - hicstuff
  commands:
    - hicstuff --help

about:
  home: https://github.com/koszullab/hicstuff
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: "General purpose stuff to generate and handle Hi-C data in its simplest form."
  doc_url: https://hicstuff.readthedocs.io/en/latest
  dev_url: https://github.com/koszullab/hicstuff

extra:
  recipe-maintainers:
    - lecorguille
