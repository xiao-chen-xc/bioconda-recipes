{% set name = "agc" %}
{% set version = "3.2.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/refresh-bio/agc/releases/download/v{{ version }}/agc-v3.2.3-arm64_linux.tar.gz  # [linux and aarch64]
    sha256: ed7c6b0ae8bbb998b73ac0314a66aeedf4add70660b2c80cabe6dcc1759c6287  # [linux and aarch64]
  - url: https://github.com/refresh-bio/agc/releases/download/v{{ version }}/agc-v3.2.3-x64_linux.tar.gz  # [linux and x86_64]
    sha256: e992ac64839a471fee8292656ff901d49b3ced7b7e8ca38c6135210c788d7db7  # [linux and x86_64]
  - url: https://github.com/refresh-bio/agc/releases/download/v{{ version }}/agc-v3.2.3-x64_mac.tar.gz  # [osx and x86_64]
    sha256: 481254311de212f14fcc2e3e964183cef8f2f463c3b0216e1f3d5135349440c4  # [osx and x86_64]
  - url: https://github.com/refresh-bio/agc/releases/download/v{{ version }}/agc-v3.2.3-m1_mac.tar.gz  # [osx and arm64]
    sha256: 5f51a516838264b9f8fa23c3f02ad5e5fde8b612011c7f2d02faf369fc31765b  # [osx and arm64]

build:
  number: 0
  script: "mkdir -p ${PREFIX}/bin; install -v -m 0755 agc ${PREFIX}/bin"
  run_exports:
    - {{ pin_subpackage('agc', max_pin="x") }}

requirements:
  build:

test:
  commands:
    - agc

about:
  home: "https://github.com/refresh-bio/agc"
  summary: "Assembled Genomes Compressor (AGC) is a tool designed to compress collections of de-novo assembled genomes. It can be used for various types of datasets: short genomes (viruses) as well as long (humans)."
  license: MIT
  license_family: MIT
  dev_url: "https://github.com/refresh-bio/agc"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - should_be_noarch_generic
    - should_not_be_noarch_source
