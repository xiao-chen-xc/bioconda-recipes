{% set version = "0.3.1" %}
{% set sha256 = "48795ee9eb6e89e49ea99a89ae42110814c3bbddf60de9fc0111a609e9b13f2b" %}

package:
  name: grz-check
  version: {{ version }}

source:
  url: https://github.com/BfArM-MVH/grz-tools/archive/refs/tags/grz-check-v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  skip: True  # [osx]
  number: 0
  run_exports:
    - {{ pin_subpackage("grz-check", max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cmake
    - make
    - cargo-bundle-licenses
    - pkg-config
  host:
    - clangdev
    - llvmlite
    - openssl
    - zlib

test:
  commands:
    - grz-check -h

about:
  home: "https://github.com/BfArM-MVH/grz-tools/tree/main/packages/grz-check"
  license: MIT
  license_family: MIT
  summary: "Validates Modellvorhaben §64e submission files for Genomrechenzentren (GRZ)."
  dev_url: "https://github.com/BfArM-MVH/grz-tools/tree/main/packages/grz-check"
  doc_url: "https://github.com/BfArM-MVH/grz-tools/blob/grz-check-v{{ version }}/packages/grz-check/README.md"

extra:
  additional-platforms:
    - linux-aarch64
  recipe-maintainers:
    - tedil
    - twrightsman
    - hoeze
