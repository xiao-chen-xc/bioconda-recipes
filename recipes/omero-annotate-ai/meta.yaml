{% set name = "omero-annotate-ai" %}
{% set version = "0.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/omero_annotate_ai-{{ version }}.tar.gz
  sha256: 25583daa6315a4c0580b7dc3a759fb6584787c51a8d4098ef151aca6efad85bf

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('omero-annotate-ai', max_pin="x") }}

requirements:
  host:
    - python
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python
    # Core dependencies
    - numpy >=1.21.0,<2.0
    - pandas >=1.3.0
    - imageio >=2.9.0
    - dask >=2021.6.0
    - pyyaml >=6.0
    - pydantic >=2.0.0
    - typing-extensions >=4.0.0
    - ezomero >=3.1.0
    - opencv >=4.5.0
    - tifffile
    # Conda-only dependencies
    - zeroc-ice >=3.6.4,<3.7
    - micro_sam >=1.7.0,<2
    # Notebook extras
    - ipywidgets >=7.6.0
    - keyring >=23.0.0
    - ipykernel

test:
  imports:
    - omero_annotate_ai

about:
  home: https://github.com/Leiden-Cell-Observatory/omero_annotate_ai
  license: Apache-2.0
  license_file: LICENSE
  summary: "OMERO integration for AI-powered image annotation and segmentation workflows"
  description: |
    Python package to support reproducible image annotation workflows for AI
    training using OMERO data repositories. Provides Jupyter widgets and tools
    for reproducible annotation, training, and inference using micro-SAM,
    Cellpose, and other AI models directly with OMERO datasets.
  dev_url: https://github.com/Leiden-Cell-Observatory/omero_annotate_ai
  doc_url: https://leiden-cell-observatory.github.io/omero_annotate_ai/

extra:
  recipe-maintainers:
    - maartenpaul
