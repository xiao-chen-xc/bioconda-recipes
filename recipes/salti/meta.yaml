{% set version = "0.9.0" %}
{% set name = "salti" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/sam-sims/{{ name }}/archive/{{ name }}-{{ version }}.tar.gz
  sha256: 26bdb7b88b1b907b3ecb62ae7663a3d6b2ab512848646de9ac9e604524e88413

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('salti', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses
  host:
    - openssl

test:
  commands:
    - salti --version

about:
  home: https://github.com/Sam-Sims/salti
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: A modern multiple sequence alignment browser - built for the terminal.

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - sam-sims
