{% set version = "2.10.0" %}
{% set sha256 = "9c824173236c6efbea451f15b99a58b2f9fd1f22a0916d0be6a5629af5d9c59c" %}

package:
  name: svdb
  version: {{ version }}

source:
  url: https://github.com/J35P312/SVDB/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation --no-cache-dir . -vvv
  run_exports:
    - {{ pin_subpackage('svdb', max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - numpy
    - cython
    - setuptools
    - rapidfuzz
  run:
    - python
    - numpy
    - rapidfuzz

test:
  commands:
    - svdb --help

about:
  home: "https://github.com/J35P312/SVDB"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Structural variant database software."
  dev_url: "https://github.com/J35P312/SVDB"
  doc_url: "https://github.com/J35P312/SVDB/blob/{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
