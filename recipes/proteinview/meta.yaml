{% set version = "0.3.0" %}

package:
  name: proteinview
  version: {{ version }}

source:
  url: https://github.com/001TMF/ProteinView/archive/v{{ version }}.tar.gz
  sha256: 6948e107fe2fc680875cf028e1ba31f406cc69ad249dc5b05c3feb0a5d64827d

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("proteinview", max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("rust") }} 
    - {{ compiler("c") }}
    - cargo-bundle-licenses

test:
  commands:
    - proteinview --help

about:
  home: "https://github.com/001TMF/ProteinView"
  license: "MIT"
  license_file:
    - LICENSE
    - THIRDPARTY.yml 
  summary: "Terminal protein structure viewer."

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
