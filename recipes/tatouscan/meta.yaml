{% set name = "tatouscan" %}
{% set version = "0.2.0" %}

package:
  name: tatouscan
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: fdee30704551bfedbd442cca2ddfa854695ee86ed2bfe7aa4209b625e5f55c32

build:
  entry_points:
    - tatouscan = tatouscan.main:app
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('tatouscan', max_pin="x.x") }}

requirements:
  host:
    - python >=3.10
    - setuptools >=61.0.0
    - pip
  run:
    - python >=3.10
    - pyfastx >=2.0.0,<3.0.0
    - typer >=0.15.0,<0.16.0
    - pyhmmer >=0.11.0,<0.12.0

test:
  imports:
    - tatouscan
  commands:
    - pip check
    - tatouscan --help
  requires:
    - pip

about:
  home: https://github.com/JeanMainguy/{{ name|lower }}
  summary: 'A command-line tool for identifying toxin-antitoxin (TA) systems in genomes and metagenomes. '
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - JeanMainguy
