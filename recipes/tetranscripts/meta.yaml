{% set version = "2.2.4" %}

package:
  name: tetranscripts
  version: {{ version }}

source:
  url: https://github.com/mhammell-laboratory/TEtranscripts/archive/{{ version }}.tar.gz
  sha256: aa7b9796cb283ae808c2a09650d8f8f48ef41c919c261b7f9772b0d6fc1f5eb0

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --ignore-installed --no-deps -vv
  run_exports:
    - {{ pin_subpackage("tetranscripts", max_pin="x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - pysam >=0.15.3
    - r-base
    - bioconductor-deseq >=1.38
    - bioconductor-deseq2 >=1.26

test:
  imports:
    - TEToolkit
    - TEToolkit.IO
    - TEToolkit.ShortRead
  commmands:
    - TEtranscripts --version
    - TEcount --version

about:
  home: http://hammelllab.labsites.cshl.edu/software#TEToolkit
  license: GPL-3.0-only
  license_file: COPYING
  summary: 'A package for including transposable elements in differential enrichment analysis of sequencing datasets.'
  license_family: GPL3
