{% set version = "1.4.0" %}

package:
  name: magmax
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('magmax', max_pin="x") }}

source:
  url: https://github.com/soedinglab/MAGmax/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 53d4736c656c0570d27ce4dccee4dc6f76e00947c4a34327f9a098b39fa6ade8

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ compiler("rust") }}
    - {{ stdlib('c') }}
    - make
    
  run:
    - skani
    - spades
    - seqtk

test:
  commands:
    - magmax --help

about:
  home: https://github.com/soedinglab/MAGmax
  license: GPL-3.0
  license_family: GPL
  license_file: LICENSE.md
  summary: MAGmax is a robust tool for dereplicating MAGs through bin merging and reassembly.
    
extra:
  recipe-maintainers:
    - yazhinia
  additional-platforms:
    - linux-aarch64
    - osx-arm64
    
