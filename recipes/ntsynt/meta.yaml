{% set name = "ntSynt" %}
{% set version = "1.0.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/BirolLab/{{ name|lower }}/releases/download/v{{ version }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: 2edfd176b3c8f7ccdc51b130e652f8ebe7f7d81b0c7e60c5b37f5ef498d92e65

build:
  number: 0
  skip: True # [py > 312]
  run_exports: 
    - {{ pin_subpackage('ntsynt', max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
  host:
    - python
    - meson
    - ninja
    - llvm-openmp  # [osx]
    - libgomp      # [linux]
    - btllib >=1.7.1
  run:
    - python
    - llvm-openmp  # [osx]
    - libgomp      # [linux]
    - btllib >=1.7.1
    - intervaltree
    - pybedtools
    - ncls
    - python-igraph
    - snakemake-minimal
    - samtools
    - seqtk

test:
  commands:
    - ntSynt -h
  imports:
    - btllib

about:
  home: "https://github.com/BirolLab/ntsynt"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "Detecting multi-genome synteny blocks using minimizer graph mapping."
  dev_url: "https://github.com/BirolLab/ntsynt"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - uses_vcs_url
