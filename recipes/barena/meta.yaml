{% set name = "barena" %}
{% set version = "0.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/quadram-institute-bioscience/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 53f872d4edf39ed69a386c7500b9fa235fcd1f04b60edb9840987db849733083

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - nim >=2.0.4  # [not arm64]
  host:
    - curl
    - pcre
    - zlib

test:
  commands:
    - barena --version | grep {{ version }}

about:
  home: "https://github.com/quadram-institute-bioscience/barena/"
  dev_url: "https://github.com/quadram-institute-bioscience/barena#barena"
  doc_url: "https://github.com/quadram-institute-bioscience/barena/blob/v{{ version }}/README.md"
  license: MIT
  license_family: MIT
  summary: "Barena is a tool to filter FASTQ reads by taxon using Kraken2 classification output"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
