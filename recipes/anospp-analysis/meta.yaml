{% set name = "anospp-analysis" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/anospp_analysis-{{ version }}.tar.gz
  sha256: 259529d9ea49d2bbe1bdb465705601181fc93956903b7dd4fc33c6de61582da8

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  entry_points:
    - anospp-prep = anospp_analysis.prep:main
    - anospp-qc = anospp_analysis.qc:main
    - anospp-plasm = anospp_analysis.plasm:main
    - anospp-nn = anospp_analysis.nn:main
    - anospp-vae = anospp_analysis.vae:main
    - anospp-agg = anospp_analysis.agg:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - pip
    - poetry-core
    - python >=3.10,<3.11
  run:
    - python >=3.10,<3.11
    - cutadapt
    - numpy
    - scipy
    - pandas
    - seaborn-base
    - bokeh
    - pyarrow
    - keras ==2.15.0
    - tensorflow-base ==2.15.0
    - blast ==2.16
    - fasttree
    - mafft

test:
  imports:
    - anospp_analysis
  commands:
    - anospp-prep -h
    - anospp-qc -h
    - anospp-plasm -h
    - anospp-nn -h
    - anospp-vae -h
    - anospp-agg -h

about:
  home: "https://pypi.org/project/anospp-analysis"
  summary: "ANOSPP data analysis."
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - amakunin
