
{% set name = "mags-visualization" %}
{% set version = "0.0.7" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/usegalaxy-eu/MAGs-visualization/archive/refs/tags/v{{ version }}.tar.gz
  sha256: cc3f64dba1e30cb72e30679a14d5657f7f1a594cd8cb400005633bc10114dd71

build:
  noarch: python
  number: 0
  script:
    - python -m pip install . --no-deps -vv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.9,<3.13
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.9,<3.13
    - pandas
    - numpy
    - matplotlib-base
    - seaborn
    - plotly
    - networkx
    - python-kaleido

test:
  imports:
      - mags_visualization
      - mags_visualization.sanky_taxa
  commands:
    - mags-visualization --help

about:
  home: https://github.com/usegalaxy-eu/MAGs-visualization
  summary: "Visualization toolkit for MAG quality, taxonomy, clustering, abundance patterns and functional annotation."
  license: GPL-3.0
  license_family: GPL3
  license_file: LICENSE

extra:
  recipe-maintainers:
    - alexandrah1704
