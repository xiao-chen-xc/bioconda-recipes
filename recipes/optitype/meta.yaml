{% set version = "1.5.0" %}

package:
  name: optitype
  version: {{ version }}

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('optitype', max_pin="x") }}

source:
  url: https://github.com/FRED-2/OptiType/archive/v{{ version }}.tar.gz
  sha256: a59e917db1f57721fc65baad703e04e76cbe293c4fe2936d4d5dae720db31da8

requirements:
  host:
    - python >=3.10
    - hatchling
    - pip
  run:
    - python >=3.10
    - click >=8.0
    - numpy >=1.23
    - pandas >=2.0
    - pyarrow >=12.0
    - pyomo >=6.6
    - pysam >=0.21
    - matplotlib-base >=3.5
    - hdf5
    - glpk
    - razers3

test:
  commands:
    - optitype --help

about:
  home: https://github.com/FRED-2/OptiType
  license: BSD-3-Clause
  summary: Precision HLA typing from next-generation sequencing data
