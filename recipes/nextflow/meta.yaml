{% set version = "26.04.1" %}
{% set sha256 = "d615326a67802b402c81e20d4ad48843f1c9e06ba9a6f2ee7a9c80d36d5e1e30" %}

package:
  name: nextflow
  version: {{ version }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('nextflow', max_pin="x.x") }}

source:
  url: https://github.com/nextflow-io/nextflow/releases/download/v{{ version }}/nextflow
  sha256: {{ sha256 }}

requirements:
  host:
    - openjdk >=17,<=24
    - coreutils          # [not win]
    - uutils-coreutils   # [win]
    - curl
  run:
    - openjdk >=17,<=24
    - coreutils          # [not win]
    - uutils-coreutils   # [win]
    - curl

test:
  commands:
    - nextflow help

about:
  home: "https://github.com/nextflow-io/nextflow"
  license: "Apache-2.0"
  summary: "A DSL for data-driven computational pipelines http://nextflow.io"

extra:
  recipe-maintainers:
    - pditommaso
    - bentsherman
    - ewels
    - mjsteinbaugh
