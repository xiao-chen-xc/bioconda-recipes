{% set name = "grz-db" %}
{% set version = "2.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/grz_db-{{ version }}.tar.gz
  sha256: 21fb7e069e2f1d89b9408d5cb20d15038f7a4d9190fa53d2c5594645912d174f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.12
    - hatchling
    - pip
  run:
    - alembic >=1.16.1
    - cryptography >=45.0.3
    - sqlmodel >=0.0.27
    - grz-pydantic-models >=2.7,<3
    - psycopg >=3.2,<4

test:
  imports:
    - grz_db
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/BfArM-MVH/grz-tools
  summary: SQL models for grz-cli and grz-watchdog
  license: MIT

extra:
  recipe-maintainers:
    - tedil
    - Hoeze
