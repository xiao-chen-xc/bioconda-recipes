{% set name = "coot-headless" %}
{% set version = "Release-1.3.1" %}

package:
  name: {{ name }}
  version: {{ version.split('-')[1] }}

source:
  url: https://github.com/pemsley/coot/archive/refs/tags/{{ version }}.tar.gz
  sha256: 39069510b2bd499a407d5cc9202d4df591b353c344dd21aaf30e2ceab8260025

build:
  number: 0
  run_exports:
    # Minor version changes may be disruptive
    # Refer to https://github.com/pemsley/coot/issues/239#issuecomment-3031606299
    - {{ pin_subpackage(name, max_pin="x.x.x") }}
  skip: True  # [py < 311]

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cmake
    - doxygen
    - ghostscript
    - ninja
    - pkg-config
    - sed  # [osx]
    - texlive-core
  host:
    - cairo
    - clipper
    - curl
    - eigen
    - elfutils  # [linux]
    - fontconfig
    - freetype
    - gemmi ==0.7.4  # Due to compatibility with servalcat
    - glm
    - gsl
    - libboost-devel 1.88.*  # Align with conda-forge's global pinning
    - libccp4
    - libffi
    - libintl-devel  # [osx]
    - libpng
    - librdkit-dev ==2026.03.1
    - libxml2 *  # Remove constraint due to deps cannot be resolved
    - mmdb2
    - nanobind
    - openblas
    - ospray
    - pixman
    - python {{ python }}
    - sqlite
    - ssm
    - tbb-devel
    - typing_extensions  # [py < 311]
    - zlib
  run:
    - acedrg
    - numpy *  # Depends only on RDKit; no version constraints
    - python {{ python }}
    - rdkit ==2026.03.1
    - servalcat >=0.4.128

test:
  imports:
    - coot_headless_api
  source_files:
    - data/tutorial-modern.pdb
    - data/rnasa-1.8-all_refmac1.mtz

about:
  home: "https://www2.mrc-lmb.cam.ac.uk/personal/pemsley/coot"
  dev_url: "https://github.com/pemsley/coot"
  doc_url: "https://www.mrc-lmb.cam.ac.uk/lucrezia/libcootapi-documentation/index.html"
  license: "GPL-3.0-or-later AND LGPL-3.0-or-later"
  license_family: GPL3
  license_file:
    - COPYING
    - COPYING.LESSERv3
  summary: "Coot Headless API - Software for macromolecular model building."
  description: |
    Coot is a macromolecular model building, model completion and validation
    application. This package provides the headless APIs (Chapi python bindings and libcootapi C++ library)
    without GUI dependencies, suitable for automated workflows.

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1107/S0907444910007493
  recipe-maintainers:
    - eunos-1128
