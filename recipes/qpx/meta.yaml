{% set name = "qpx" %}
{% set version = "1.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 80afef9d60e395126d3eac5e7bddfd2b04178a7540ddba40b9af7cf45dc5923e

build:
  number: 1
  noarch: python
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  entry_points:
    - qpxc = qpx.cli.main:main

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=3.10
    - click >=8.1
    - pandas >=2.1
    - pyarrow >=14.0
    - pyopenms >=3.3.0,<3.5.0
    - numpy >=1.24
    - duckdb >=1.1.3
    - pyyaml >=6.0
    - scipy
    - mudata >=0.2.4
    - anndata >=0.9.0

test:
  imports:
    - qpx
  commands:
    - qpxc --help
    - pip check
  requires:
    - pip

about:
  home: https://github.com/bigbio/qpx
  summary: 'Quantitative proteomics data toolkit — convert, transform, query, and validate QPX Parquet datasets'
  description: |
    qpx is a Python toolkit for working with quantitative proteomics data in
    the QPX Parquet format. It provides commands to convert results from
    common search engines, transform and aggregate quantitative data, run
    SQL-style queries with DuckDB, and validate datasets against the QPX
    schema.
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  doc_url: https://qpx.quantms.org
  dev_url: https://github.com/bigbio/qpx

extra:
  recipe-maintainers:
    - ypriverol
