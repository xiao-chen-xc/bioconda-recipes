{% set version = '2.0' %}

package:
  name: r-mkmisc
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/MKmisc_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/MKmisc/MKmisc_{{ version }}.tar.gz
  sha256: 852476694acf9f93fd3952aad2ed63b94d6d7cf0f16a6b6582c989855f7df359

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  run_exports:
    - {{ pin_subpackage('r-mkmisc', max_pin="x") }}

requirements:
  host:
    - r-base
    - r-rcolorbrewer
    - r-ggplot2
    - bioconductor-limma
    - r-robustbase
    - r-scales
  run:
    - r-base
    - r-rcolorbrewer
    - r-ggplot2
    - bioconductor-limma
    - r-robustbase
    - r-scales

test:
  commands:
    - $R -e "library('MKmisc')"

about:
  home: http://www.stamats.de/
  license: LGPL-3.0-only
  summary: Contains several functions for statistical data analysis; e.g. for sample size and
    power calculations, computation of confidence intervals and tests, and generation
    of similarity matrices.
  license_family: LGPL
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/LGPL-3'
