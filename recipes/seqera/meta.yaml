{% set version = "1.8.0" %}
{% set name = "seqera" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://registry.npmjs.org/@seqera/cli-linux-x64/-/cli-linux-x64-{{ version }}.tgz  # [linux]
    sha256: 254fe67c6be80aa4ffaf8a9408b18773adc4144d0b86c2fd05f78e9a1d6f00aa  # [linux]
  - url: https://registry.npmjs.org/@seqera/cli-darwin-x64/-/cli-darwin-x64-{{ version }}.tgz  # [osx and x86_64]
    sha256: 0cb5d96c50cf0d2d9f212087d6969f04302f5de809ab24ae4e51d17d68254193  # [osx and x86_64]
  - url: https://registry.npmjs.org/@seqera/cli-darwin-arm64/-/cli-darwin-arm64-{{ version }}.tgz  # [osx and arm64]
    sha256: d96f99ddc911e13e036b7acdcb913e8dfecdea406076052a8f129ddbf51dd307  # [osx and arm64]

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

test:
  commands:
    - which seqera  # binary requires glibc >=2.25; Bioconda CI runs in CentOS 7 (glibc 2.17), so we can't execute it

about:
  home: "https://seqera.io"
  summary: "AI-powered CLI assistant for bioinformatics workflows and Seqera Platform"
  description: |
    Seqera AI is an intelligent command-line assistant for bioinformatics workflow
    development and management. It can help you write, debug, and understand Nextflow
    pipelines, generate configuration and schema files, build containerized environments
    using Wave, and interact with workflows and compute resources on Seqera Platform
    through a conversational interface.
  license: "BUSL-1.1"
  license_file: LICENSE
  license_url: "https://spdx.org/licenses/BUSL-1.1.html"

extra:
  skip-lints:
    - should_be_noarch_generic  # pre-built platform-specific binaries, one per platform
  additional-platforms:
    - osx-arm64
  recipe-maintainers:
    - ewels
    - edmundmiller
    - vpatel85
    - MythicalFish
    - odagayev
