{% set name = "grzctl" %}
{% set version = "2.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/grzctl-{{ version }}.tar.gz
  sha256: a5bae720a9cc097f7d88a256b56a06d726a8ff3d48d04199d256b139133a87bc

build:
  number: 0
  noarch: python
  entry_points:
    - grzctl = grzctl.cli:main
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.12
    - hatchling
    - pip
  run:
    - python >=3.12
    - requests >=2.32.3,<3
    - grz-db >=2.1,<3
    - grz-cli >=1.7,<2
    - textual >=5.3,<6

test:
  imports:
    - grzctl
  commands:
    - pip check
    - grzctl --help
  requires:
    - pip

about:
  home: "https://github.com/BfArM-MVH/grz-tools"
  summary: "Control CLI for GRZ administrators."
  license: MIT
  license_family: MIT
  dev_url: "https://github.com/BfArM-MVH/grz-tools"
  doc_url: "https://github.com/BfArM-MVH/grz-tools/blob/grzctl-v{{ version }}/packages/grz-cli/README.md"

extra:
  recipe-maintainers:
    - hoeze
    - tedil
