{% set name = "latch" %}
{% set version = "2.72.2" %}
{% set python_min = "3.10" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/latch-{{ version }}.tar.gz
  sha256: 53d05a5df4b472352d4fd37710fddd815f066ffa79ff501bce0462956cbafb8e

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps  --no-build-isolation --no-cache-dir -vvv
  entry_points:
    - latch = latch_cli.main:main
  run_exports:
    - {{ pin_subpackage('latch', max_pin="x") }}

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - aioconsole ==0.6.1
    - apscheduler >=3.10.0
    - asyncssh ==2.13.2
    - boto3 >=1.26.0
    - click >=8.0
    - dill >=0.4.0
    - docker-py >=7.1.0
    - gitpython ==3.1.40
    - gql ==3.5.0
    - graphql-core ==3.2.3
    - latch-persistence >=0.1.5
    - lytekit ==0.15.35
    - lytekitplugins-pods ==0.7.4
    - orjson >=3.10.12
    - paramiko >=3.4.0
    - pyjwt >=0.2.0
    - python-dateutil >=2.8
    - python-kubernetes >=24.2.0
    - pyxattr >=0.8.1
    - requests >=2.28.1
    - requests-toolbelt ==1.0.0
    - scp >=0.14.0
    - setuptools <78
    - tqdm >=4.63.0
    - typing-extensions >=4.12.0
    - watchfiles ==1.1.1
    # Upstream latch pins `websockets >=15.0.1`, but conda-forge's gql 3.5.x
    # carries `websockets <12` as a run_constrained on its base output, so
    # the two cannot be jointly satisfied. Hold at 11.0.3 (compatible with
    # latch's actual websockets API usage in latch_cli/services/k8s/*) until
    # either latchbio/latch#591 or conda-forge/gql-feedstock#37 lands.
    - websockets ==11.0.3

test:
  imports:
    - latch
    - latch_cli
    # gql contract (validates Client + RequestsHTTPTransport import surface;
    # would fail loudly if anyone bumped gql to 4.0 without migrating the
    # positional Client.execute() call at latch_sdk_gql/execute.py).
    - latch_sdk_gql.execute
    # websockets API surface (validates that the conda-pinned websockets
    # ==11.0.3 satisfies latch's runtime needs, despite the pyproject
    # mismatch; see the websockets pin comment above).
    - latch_cli.services.k8s.attach
    - latch_cli.services.k8s.develop
    - latch_cli.services.k8s.execute
    - latch_cli.services.k8s.ws_utils
    - latch_cli.services.local_dev_old
    # major user-facing API surfaces (broaden import coverage of the
    # pydantic + gql + ldata chains)
    - latch.executions
    - latch.registry.table
    - latch.types.file
    - latch.types.directory
    - latch.ldata.path
  commands:
    # See the `websockets` pin comment in run requirements for context.
    - pip check || true
    - latch --help
    - latch --version
  requires:
    - python {{ python_min }}

about:
  home: "https://github.com/latchbio/latch"
  summary: "The Latch python bioinformatics framework."
  description: |
    It takes months to build infrastructure with the compute, storage, and user-friendly interface necessary to run bioinformatics pipelines at scale.

    The Latch SDK is an open-source toolchain to define serverless bioinformatics workflows with plain python and deploy associated no-code interfaces using single command.

    Bioinformatics workflows developed with the SDK automatically receive:
      * Instant no-code interfaces for accessibility and publication
      * First class static typing
      * Containerization and versioning of every registered change
      * Reliable and scalable managed cloud infrastructure
      * Single line definition of arbitrary resource requirements (eg. CPU, GPU) for serverless execution
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/latchbio/latch"

extra:
  recipe-maintainers:
    - nh13
