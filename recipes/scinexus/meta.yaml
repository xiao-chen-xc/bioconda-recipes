{% set name = "scinexus" %}
{% set version = "2026.5.18" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 5b46c1f562f11218f558d863e1dc570e8b194385422473a5927cb45ad6ea63ca

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling
  run:
    - python >=3.11
    - charset-normalizer
    - citeable
    - scitrack
    - tqdm
    - typeguard

test:
  imports:
    - scinexus

about:
  home: https://github.com/cogent3/scinexus
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: A Python framework for rapid development of data processing applications
  doc_url: https://scinexus.readthedocs.io
  dev_url: https://github.com/cogent3/scinexus

extra:
  recipe-maintainers:
    - GavinHuttley
