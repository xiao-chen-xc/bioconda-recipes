package:
  name: perl-test-most
  version: "0.42"

source:
  url: https://cpan.metacpan.org/authors/id/D/DC/DCANTRELL/Test-Most-0.42.tar.gz
  sha256: a418935483def0a46259a50bff6320842792a5a02777192667de222475253075

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('perl-test-most', max_pin="x.x") }}

requirements:
  build:
    - make
  host:
    - perl
    - perl-exception-class
    - perl-test-deep
    - perl-test-differences
    - perl-test-exception
    - perl-test-warn

  run:
    - perl
    - perl-exception-class
    - perl-test-deep
    - perl-test-differences
    - perl-test-exception
    - perl-test-warn

test:
  imports:
    - Test::Most
    - Test::Most::Exception

about:
  home: http://metacpan.org/pod/Test-Most
  license: unknown
  summary: 'Most commonly needed test functions and features'
