{% set version = "1.3.12" %}

package:
  name: zdb
  version: {{ version }}

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('zdb', max_pin="x.x") }}

source:
  url: https://github.com/metagenlab/zDB/archive/refs/tags/v1.3.12.tar.gz
  sha256: 6886c4e7153ea2ca4f13a30c57832a25f05097fc885cbf08028a0a402c531f07

requirements:
  run:
    - nextflow >=24.04,<26.04
    - conda >=23.10.0

test:
  commands:
    - "zdb"

about:
  home: https://github.com/metagenlab/zDB/
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: zDB is both a bacterial comparative genomics pipeline and a tool to visualize the results
  dev_url: https://github.com/metagenlab/zDB/
  doc_url: https://zdb.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - bkm
    - njohner
  identifiers:
    - biotools:zDB
