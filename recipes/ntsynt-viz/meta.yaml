{% set name = "ntsynt-viz" %}
{% set version = "1.0.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/BirolLab/{{ name }}/releases/download/v{{ version }}/{{ name }}-{{ version }}.tar.gz
  sha256: c6a6f0839f5a78b0bc6b34c417440fe5222ae0271435ddb4a7ccac3f3be857dc

build:
  number: 0
  noarch: generic
  run_exports: 
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  run:
    - python >=3.8
    - snakemake
    - quicktree
    - intervaltree
    - r-base
    - bioconductor-treeio
    - r-ggpubr 
    - bioconductor-ggtree 
    - r-phytools 
    - r-dplyr 
    - r-argparse 
    - r-scales 
    - r-stringr 
    - r-gggenomes >=1.1.0
    - r-tidyr
    - r-svglite

test:
  commands:
    - ntsynt_viz.py --help

about:
  home: https://github.com/BirolLab/ntSynt-viz
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 'Visualizing multi-genome synteny patterns'
  dev_url: https://github.com/BirolLab/ntSynt-viz
