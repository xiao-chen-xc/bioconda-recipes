{% set name = "kcounter" %}
{% set version = "0.1.2" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 448a315f9ad36633d6800fb85e799393bd68296486947a5c01eaa6e934da108e

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  script:
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --disable-pip-version-check
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - {{ compiler("c") }}
    - {{ compiler("rust") }}
    - {{ stdlib("c") }}
    - cargo-bundle-licenses
    - python                              # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - crossenv                            # [build_platform != target_platform]
    - maturin <=1.7.8                     # [build_platform != target_platform]
  host:
    - pip
    - maturin <=1.7.8
    - python
  run:
    - python

test:
  imports:
    - kcounter

about:
  home: https://github.com/apcamargo/kcounter
  license: GPL-3
  license_family: GPL
  license_file: LICENSE
  summary: "A simple library for counting DNA k-mers in Python. Written in Rust."

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - version_constraints_missing_whitespace  # see https://github.com/bioconda/bioconda-recipes/issues/51185
