{% set version = "0.6.2" %}
{% set sha256 = "f111a6a5432550baa4220913c95a451d3ffc9f99a06e258d722056f3f548f853" %}

package:
  name: vcf2tsvpy
  version: {{ version }}

source:
  url: https://github.com/sigven/vcf2tsvpy/archive/refs/tags/v{{ version }}.tar.gz
  sha256: '{{ sha256 }}'

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage('vcf2tsvpy', max_pin="x.x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  build:
    - curl
    - unzip
    - tar
    - python
  run:
    - python
    - numpy
    - cyvcf2
    - pip

test:
  commands:
    - vcf2tsvpy --version

about:
  home: https://github.com/sigven/vcf2tsvpy
  license: MIT
  summary: 'Genomic VCF to tab-separated values (TSV)'
