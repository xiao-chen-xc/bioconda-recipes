{% set name = "nf-docs" %}
{% set version = "0.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nf_docs-{{ version }}.tar.gz
  sha256: a6ea9cf1123bc80549ac7ff43d6fc801aac9311daefed195b0646af9e280f09e

build:
  number: 0
  noarch: python
  entry_points:
    - nf-docs = nf_docs.cli:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('nf-docs', max_pin="x.x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
  run:
    - python >=3.10
    - rich-click >=1.7
    - pyyaml >=6.0
    - jinja2 >=3.0
    - rich >=13.0
    - httpx >=0.25
    - markdown >=3.0
    - pygments >=2.0
    # pygments-csv-lexer >=0.1  # not available as conda package, pygments falls back to plain text without it

test:
  imports:
    - nf_docs
  commands:
    - nf-docs --help

about:
  home: "https://github.com/ewels/nf-docs"
  summary: "Generate API documentation for Nextflow pipelines by querying the Nextflow Language Server"
  license: "Apache-2.0"
  license_family: Apache
  license_file: LICENSE
  dev_url: "https://github.com/ewels/nf-docs"
  doc_url: "https://ewels.github.io/nf-docs/"

extra:
  recipe-maintainers:
    - ewels
