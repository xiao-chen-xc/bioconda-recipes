{% set name = "pear" %}
{% set version = "0.9.11" %}

package:
  name: {{ name }}
  version: {{ version|replace("-", "_") }}

source:
  fn: pear-{{ version }}.tar.gz
  url: https://www.h-its.org/index.php?eddfile=78401%3A15508%3A11&ttl=1778679892&file=11&token=20a12fe7135990add913733e95dcb2f41a5ba2c7e32a7e11e9cbcacec2cdb4f3&oiid=7655
  sha256: 94f4a1835cd75ec6fab83405c2545ddba6b6bb1644579222e9cc2ad57a59d654
  patches:
    - patches/0001-skip-unused-asm-code.patch

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin = "x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - make
    - pkgconfig
    - automake
  host:
    - bzip2
    - zlib

test:
  commands:
    - pear 2>&1 | grep "PEAR v{{ version }}"
    - pearRM 2>&1 | grep "PEAR v{{ version }}"

about:
  home: https://sco.h-its.org/exelixis/web/software/pear/
  license: CC-BY-NC-SA-3.0
  license_file: LICENSE.txt
  summary: Paired-End reAd mergeR

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:PEAR
  skip-lints:
    - should_not_use_fn
