{% set name = "panoptes-ui" %}
{% set version = "1.0.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz"
  sha256: 5f539b9f30ea88a3459d7cb647d2b9e52ee83c21e3a965ff2d6592581886f038

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x') }}
  entry_points:
    - panoptes=panoptes:main
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"

requirements:
  host:
    - flask >=1.1.1
    - humanfriendly >=4.18
    - marshmallow >=3.0.1
    - pip
    - python >=3.11
    - setuptools
    - sqlalchemy >=1.3.7
  run:
    - flask >=1.1.1
    - humanfriendly >=4.18
    - marshmallow >=3.0.1
    - python >=3.11
    - sqlalchemy >=1.3.7

test:
  imports:
    - panoptes
    - panoptes.routes
    - panoptes.server_utilities
    - panoptes.static
    - panoptes.static.src
    - panoptes.tests
  commands:
    - panoptes --help

about:
  home: "https://github.com/panoptes-organization/panoptes"
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: "panoptes: monitor computational workflows in real time"

extra:
  recipe-maintainers:
    - fgypas
