{% set name = "perl-array-intspan" %}
{% set version = "2.003" %}
{% set sha256 = "fb6a6a8972874f84aa3e57c43f693edd9b0170075fb3e06d43c0f748ae53e681" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/D/DD/DDUMONT/Array-IntSpan-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - make
    - perl
  run:
    - perl

test:
  imports:
    - Array::IntSpan

about:
  home: https://metacpan.org/dist/Array-IntSpan
  dev_url: https://github.com/dod38fr/array-intspan-perl
  license: perl_5
  license_file: LICENSE
  summary: 'Sets of integers organized as a set of ranges'

extra:
  recipe-maintainers:
    - lskatz
