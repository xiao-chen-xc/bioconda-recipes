{% set name = "perl-array-intspan" %}
{% set version = "2.004" %}
{% set sha256 = "4dcd17afce0955ee6b2a9bdd6e06669b9fa1daca161e11b4808f0e33a0ce0c99" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/D/DD/DDUMONT/Array-IntSpan-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: generic
  number: 1
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - make
    - perl >=5.14
  run:
    - perl >=5.14

test:
  imports:
    - Array::IntSpan

about:
  home: https://metacpan.org/dist/Array-IntSpan
  dev_url: https://github.com/dod38fr/array-intspan-perl
  license: perl_5
  license_file: LICENSE
  summary: 'Sets of integers organized as a set of ranges'

extra:
  recipe-maintainers:
    - lskatz
