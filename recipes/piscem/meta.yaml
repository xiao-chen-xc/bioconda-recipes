{% set version = "0.20.0" %}
{% set name = "piscem" %}
{% set sha256 = "fa9d0edb6b1a75cb4b4bbf34e5bbbf48c5030018f3c4ea031afc09f30236f644" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  number: 0
  skip: True  # [win]
  script_env:
    - CFLAGS=-I$PREFIX/include
    - CXXFLAGS=-I$PREFIX/include
    - LDFLAGS=-L$PREFIX/lib
  run_exports:
    - {{ pin_subpackage("piscem", max_pin="x.x") }}



source:
  url: https://github.com/COMBINE-lab/piscem/releases/download/v{{ version }}/source-full.tar.gz
  sha256: {{ sha256 }}

channels:
  - conda-forge
  - bioconda
  - defaults

requirements:
  build:
    - cmake <4.0.0
    - autoconf
    - make
    - bzip2
    - jemalloc >=5.2.1
    - {{ compiler('rust') }}
    - {{ compiler('cxx') }}
    - pkg-config
    - curl
  host:
    - bzip2
    - jemalloc >=5.2.1
    - tapi  # [osx and x86_64]
  run:
    - __osx >={{ MACOSX_DEPLOYMENT_TARGET|default("10.9") }}  # [osx and x86_64]

test:
  commands:
    - piscem --help

about:
  home: https://github.com/COMBINE-lab/piscem
  license: BSD 3-Clause
  license_file: LICENSE
  summary: piscem is a next-generation compacted colored de Bruijn Graph-based indexer and mapper

extra:
  skip-lints: 
    - compiler_needs_stdlib_c
  additional-platforms:
    - linux-aarch64
    - osx-arm64
